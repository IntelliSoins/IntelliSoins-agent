name: Fetch repository checkout
description: Authenticated shallow checkout for private mirrors and PR validation.

inputs:
  ref:
    description: Commit SHA or ref to fetch.
    required: true
  fallback-ref:
    description: Optional fallback ref when primary fetch fails on workflow_dispatch.
    required: false
    default: ""
  depth:
    description: Fetch depth.
    required: false
    default: "1"
  allow-workflow-dispatch-fallback:
    description: Whether workflow_dispatch may fall back from target_ref to fallback-ref.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - shell: bash
      env:
        CHECKOUT_REPO: ${{ github.repository }}
        CHECKOUT_REF: ${{ inputs.ref }}
        CHECKOUT_FALLBACK_REF: ${{ inputs.fallback-ref }}
        CHECKOUT_DEPTH: ${{ inputs.depth }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        ALLOW_WORKFLOW_DISPATCH_FALLBACK: ${{ inputs.allow-workflow-dispatch-fallback }}
      run: |
        set -euo pipefail
        git init "$GITHUB_WORKSPACE"
        git -C "$GITHUB_WORKSPACE" config gc.auto 0
        git -C "$GITHUB_WORKSPACE" remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${CHECKOUT_REPO}.git"
        fetch_checkout_ref() {
          local ref="$1"
          local fetch_status
          for attempt in 1 2 3; do
            timeout --signal=TERM --kill-after=10s 30s git -C "$GITHUB_WORKSPACE" \
              -c protocol.version=2 \
              fetch --no-tags --prune --no-recurse-submodules --depth="${CHECKOUT_DEPTH}" origin \
              "+${ref}:refs/remotes/origin/checkout" && return 0
            fetch_status="$?"
            if [ "$fetch_status" != "124" ] && [ "$fetch_status" != "137" ]; then
              return "$fetch_status"
            fi
            if [ "$attempt" = "3" ]; then
              return "$fetch_status"
            fi
            echo "::warning::checkout fetch for '$ref' timed out on attempt $attempt; retrying"
            sleep 5
          done
        }
        if fetch_checkout_ref "$CHECKOUT_REF"; then
          :
        else
          fetch_status="$?"
          if [ "$fetch_status" = "124" ] || [ "$fetch_status" = "137" ]; then
            echo "::error::checkout fetch for '$CHECKOUT_REF' timed out"
            exit "$fetch_status"
          fi
          if [ "$ALLOW_WORKFLOW_DISPATCH_FALLBACK" != "true" ] \
            || [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ] \
            || [ -z "$CHECKOUT_FALLBACK_REF" ] \
            || [ "$CHECKOUT_REF" = "$CHECKOUT_FALLBACK_REF" ]; then
            exit "$fetch_status"
          fi
          echo "::warning::workflow_dispatch target_ref '$CHECKOUT_REF' is unavailable; falling back to '$CHECKOUT_FALLBACK_REF'"
          fetch_checkout_ref "$CHECKOUT_FALLBACK_REF"
        fi
        git -C "$GITHUB_WORKSPACE" checkout --detach refs/remotes/origin/checkout
