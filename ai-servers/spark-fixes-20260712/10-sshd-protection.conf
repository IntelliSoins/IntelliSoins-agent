# PATCH ai-spark 2026-07-12 — protection sshd contre la starvation mémoire/CPU
# Incident : FT Qwen3.5-4B a saturé la mémoire unifiée GB10 → sshd banner
# exchange timeout → perte totale de l'accès distant (task-102).
# OOMScoreAdjust=-1000 : jamais tué par l'OOM killer.
# MemoryMin : le reclaim mémoire épargne ce cgroup en pression.
# CPUWeight/IOWeight élevés : sshd garde la priorité sous contention.
[Service]
OOMScoreAdjust=-1000
MemoryMin=256M
CPUWeight=1000
IOWeight=500
