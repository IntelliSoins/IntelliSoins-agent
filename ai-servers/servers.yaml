# ~/ai-servers/servers.yaml — Registre des serveurs IA locaux
# Source de verite unique. Editer ce fichier puis `aictl install` pour regenerer les LaunchAgents.
#
# Champs:
#   name            Nom d'affichage
#   category        llm | vlm | embedding | reranker | vector_store | ocr | tts | stt | webrtc | translation | app
#   port            Port TCP (null pour les apps macOS)
#   host            Adresse d'ecoute (defaut: 127.0.0.1)
#   launcher        Chemin relatif du script de lancement
#   autostart       Demarrer au login (RunAtLoad)
#   keepalive       Redemarrer si crash (KeepAlive)
#   requires_disk   Attend le disque PRO-G40 avant de demarrer
#   log_stdout      Chemin relatif du log stdout
#   log_stderr      Chemin relatif du log stderr
#   health_endpoint Chemin HTTP pour health check (defaut: /health)
#   throttle        Intervalle minimum entre redemarrages en secondes (defaut: 30)
#   working_dir     Repertoire de travail (optionnel)
#   managed_by      Si present, aictl affiche le status mais ne controle pas (ex: brew)
#   process_match   Pattern pgrep -f pour apps sans port
#   env             Variables d'environnement supplementaires (cle: valeur)

servers:
